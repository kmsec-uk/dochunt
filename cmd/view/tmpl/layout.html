            <div id="stats">

        </div>
        <button class="secondary" id="theme">Change theme (requires JavaScript)</button>

</html>
<script>
    const turnOnTxt = "Light mode"
    const turnOffTxt = "Dark mode"
    // initial
    let mediaQueryIsDark = false

    const darkModeMediaQuery = window.matchMedia('(prefers-color-scheme: dark)');

    mediaQueryIsDark = darkModeMediaQuery.matches

    darkModeMediaQuery.addEventListener('change', (e) => {
        mediaQueryIsDark = e.matches;
    });

    const isDark = () => document.documentElement.dataset.theme === "dark" || mediaQueryIsDark || localStorage.getItem('theme') === "dark"

    // set in case media query / localstorage is dark
    if (isDark()) {
        document.documentElement.dataset.theme = "dark"
    }
    // changer
    const themeButton = document.querySelector("#theme")

    themeButton.textContent = isDark() ? turnOnTxt : turnOffTxt

    themeButton.addEventListener("click", () => {
        var wasDark = isDark()
        document.documentElement.dataset.theme = wasDark ? "light" : "dark"
        themeButton.textContent = wasDark ? turnOffTxt : turnOnTxt
        localStorage.setItem("theme", wasDark ? "light" : "dark")
    })
</script>
