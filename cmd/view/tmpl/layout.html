<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <meta name="author" content="kmsec-uk">
    <meta name="description" content="dochunt.kmsec.uk: public parsed Google Docs dataset">
    <meta name="keywords" content="Google Docs, research, threat intelligence">
    <link rel="icon" href="/static/favicon.svg" />
    <link rel="stylesheet" href="/static/pico.min.css" />
    <title>{{ .Title}} | dochunt</title>
    <style>
        body>header {
            min-height: 3rem;
            max-height: 4rem;
            display: flex;
            justify-content: space-between;
        }

        #stats {
            display: flex;
            flex-wrap: nowrap;
            gap: 0.5rem;
            font-size: small;
        }

        #stats>* {
            padding-inline: 0.2rem;
            padding-block: 0.2rem;
            white-space: nowrap;
        }
        #theme {
            display:block;
            width:fit-content;
            height: 1.5rem;
            padding-inline: 0.3rem;
            padding-block: 0.1rem;
            text-align: center;
            font-size: smaller;
        }

        .dochunt::before {
            content: url("data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxNSIgaGVpZ2h0PSIxNSIgdmlld0JveD0iMCAwIDI0IDI0Ij48ZyBmaWxsPSJub25lIiBzdHJva2U9IiMzNEE4NTMiIHN0cm9rZS1saW5lY2FwPSJyb3VuZCIgc3Ryb2tlLWxpbmVqb2luPSJyb3VuZCIgc3Ryb2tlLXdpZHRoPSIxLjUiPjxwYXRoIGQ9Ik0xNSAyLjVWNGMwIDEuNDE0IDAgMi4xMjEuNDQgMi41NkMxNS44NzggNyAxNi41ODUgNyAxOCA3aDEuNSIvPjxwYXRoIGQ9Ik00IDE2VjhjMC0yLjgyOCAwLTQuMjQzLjg3OS01LjEyMUM1Ljc1NyAyIDcuMTcyIDIgMTAgMmg0LjE3MmMuNDA4IDAgLjYxMyAwIC43OTcuMDc2Yy4xODMuMDc2LjMyOC4yMi42MTcuNTFsMy44MjggMy44MjhjLjI5LjI5LjQzNC40MzQuNTEuNjE4Yy4wNzYuMTgzLjA3Ni4zODguMDc2Ljc5NlYxNmMwIDIuODI4IDAgNC4yNDMtLjg3OSA1LjEyMUMxOC4yNDMgMjIgMTYuODI4IDIyIDE0IDIyaC00Yy0yLjgyOCAwLTQuMjQzIDAtNS4xMjEtLjg3OUM0IDIwLjI0MyA0IDE4LjgyOCA0IDE2bTQtNWg4bS04IDNoOG0tOCAzaDQuMTciLz48L2c+PC9zdmc+");
        }

        body>footer>sub {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-evenly;
        }
    </style>

</head>

<body>
    <header class="container">
        <div>
            <a href="/" title="dochunt: a collection of parsed Google Docs content for your perusal">
                <code class="dochunt">dochunt</code>
            </a>
            <div id="stats">
                <p>Total docs: {{.NumProcessedDocs}}</p>
                <p>DB size: {{.SizeOnDisk}}</p>
                <a href="/about">About</a>
            </div>
        </div>
        <button class="secondary" id="theme">Change theme</button>
    </header>
    <hr />
    <main class="container">

        <h1>{{ .Title }}</h1>

        {{template "main" .}}
    </main>
    <footer class="container">
        <sub>
            <p>From <a target="_blank" href="https://kmsec.uk">kmsec-uk</a>.</p>
            <p>Styled with <a target="_blank" href="https://picocss.com/">PicoCSS</a>.</p>
            <p>Source available on <a target="_blank" href="https://github.com/kmsec-uk/dochunt">GitHub</a>.</p>
        </sub>
    </footer>
    <script>
        const turnOnTxt = "🌞"
        const turnOffTxt = "🌚"
        // initial
        const darkModeMediaQuery = window.matchMedia('(prefers-color-scheme: dark)');

        if (darkModeMediaQuery.matches && localStorage.getItem('theme') === null ) {
            localStorage.setItem("theme", "dark")
        }

        if (localStorage.getItem('theme') === "dark") {
            document.documentElement.dataset.theme = "dark"
        } else {
            document.documentElement.dataset.theme = "light"
        }

        const isDark = () => document.documentElement.dataset.theme === "dark"

        // changer
        const themeButton = document.querySelector("#theme")

        themeButton.textContent = isDark() ? turnOnTxt : turnOffTxt

        themeButton.addEventListener("click", () => {
            var wasDark = isDark()
            document.documentElement.dataset.theme = wasDark ? "light" : "dark"
            themeButton.setAttribute("title", wasDark ? "Change theme to dark mode" : "Change theme to light mode")
            themeButton.textContent = wasDark ? turnOffTxt : turnOnTxt
            localStorage.setItem("theme", wasDark ? "light" : "dark")
        })
    </script>
</body>
</html>
